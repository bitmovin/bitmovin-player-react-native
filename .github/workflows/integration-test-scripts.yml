name: Integration Test Scripts

on:
  pull_request:
    paths:
      - '.github/workflows/integration-test-scripts.yml'
      - 'integration_test/package.json'
      - 'integration_test/yarn.lock'
      - 'integration_test/scripts/**'
  push:
    branches: [development, development-v0]
    paths:
      - '.github/workflows/integration-test-scripts.yml'
      - 'integration_test/package.json'
      - 'integration_test/yarn.lock'
      - 'integration_test/scripts/**'
  workflow_dispatch:

concurrency:
  group: integration-test-scripts-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test-integration-scripts:
    name: Test integration scripts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup node and npm registry
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org/'
          cache: 'yarn'
          cache-dependency-path: integration_test/yarn.lock

      - name: Run integration test script suite
        run: yarn --cwd integration_test test:scripts
